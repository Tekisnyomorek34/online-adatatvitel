<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Adatátvitel</title>
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: #e0e0e0; text-align: center; padding: 20px; }
        .box { max-width: 500px; margin: 20px auto; background: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333; }
        input, button { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #2a2a2a; color: white; }
        button { background: #007bff; cursor: pointer; font-weight: bold; border: none; }
        button:hover { background: #0056b3; }
        #chat { height: 150px; border: 1px solid #444; background: #000; overflow-y: scroll; padding: 10px; text-align: left; margin: 10px 0; }
        .hidden { display: none; }
        .alert-box { background: #332200; border: 1px solid #ff9900; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .btn-yes { background: #28a745; width: 40%; margin: 5px; }
        .btn-no { background: #dc3545; width: 40%; margin: 5px; }
    </style>
</head>
<body>

    <div id="login-screen" class="box">
        <h2>Zárt Adatátviteli Csatorna</h2>
        <p>Kérlek, add meg a belépési jelszót:</p>
        <input type="password" id="password-input" placeholder="Jelszó...">
        <button onclick="ellenorizJelszo()">Belépés</button>
        <p id="login-error" style="color: red;"></p>
    </div>

    <div id="main-screen" class="box hidden">
        <h2>Adatkapcsolat Aktív</h2>
        <p>A Te egyedi azonosítód (küldd el a társadnak): <br><b id="my-id" style="color: #00ffcc;">Betöltés...</b></p>
        <hr style="border-color: #333;">
        <p>Csatlakozás a társhoz:</p>
        <input type="text" id="peer-id-input" placeholder="Társad azonosítója...">
        <button onclick="csatlakozasAStarsig()">Kapcsolódás</button>
        <p>Státusz: <span id="status" style="color: yellow;">Várakozás kapcsolatra...</span></p>

        <div id="incoming-alert" class="alert-box hidden">
            <p id="alert-text">Új adatcsomag érkezett!</p>
            <button class="btn-yes" onclick="adatElfogadasa()">Elfogadás</button>
            <button class="btn-no" onclick="adatElutasitasa()">Elutasítás</button>
        </div>
        <hr style="border-color: #333;">
        <input type="text" id="message-input" placeholder="Küldendő adat/üzenet..." disabled>
        <button id="send-btn" onclick="adatKuldese()" disabled>Adatcsomag Küldése</button>
        <div id="chat"></div>
    </div>

    <script>
        const HELYES_JELSZO = "ezegyoldal123";
        let peer; let conn; let ideiglenesAdat = null;

        function ellenorizJelszo() {
            const beirt = document.getElementById("password-input").value;
            if (beirt === HELYES_JELSZO) {
                document.getElementById("login-screen").classList.add("hidden");
                document.getElementById("main-screen").classList.remove("hidden");
                rendszerInditasa();
            } else {
                document.getElementById("login-error").innerText = "Hibás jelszó!";
            }
        }

        function rendszerInditasa() {
            peer = new Peer();
            peer.on('open', (id) => { document.getElementById("my-id").innerText = id; });
            peer.on('connection', (connection) => { conn = connection; kapcsolatBeallitasa(); });
        }

        function csatlakozasAStarsig() {
            const tarsId = document.getElementById("peer-id-input").value;
            if (tarsId) { conn = peer.connect(tarsId); kapcsolatBeallitasa(); }
        }

        function kapcsolatBeallitasa() {
            conn.on('open', () => {
                document.getElementById("status").innerText = "Összekapcsolva!";
                document.getElementById("status").style.color = "#28a745";
                document.getElementById("message-input").disabled = false;
                document.getElementById("send-btn").disabled = false;
            });
            conn.on('data', (data) => {
                ideiglenesAdat = data;
                document.getElementById("alert-text").innerText = "Érkező adatcsomag! Elfogadod?";
                document.getElementById("incoming-alert").classList.remove("hidden");
            });
            conn.on('close', () => {
                document.getElementById("status").innerText = "A kapcsolat megszakadt.";
                document.getElementById("status").style.color = "red";
            });
        }

        function adatElutasitasa() {
            ideiglenesAdat = null;
            document.getElementById("incoming-alert").classList.add("hidden");
            kiirKonzolra("Rendszer", "Bejövő adatcsomag elutasítva.", "red");
        }

        function adatElfogadasa() {
            if (ideiglenesAdat) { kiirKonzolra("Társad", ideiglenesAdat, "#00ffcc"); ideiglenesAdat = null; }
            document.getElementById("incoming-alert").classList.add("hidden");
        }

        function adatKuldese() {
            const msgInput = document.getElementById("message-input");
            const adat = msgInput.value;
            if (adat && conn && conn.open) {
                conn.send(adat);
                kiirKonzolra("Én", adat, "#aaa");
                msgInput.value = "";
            }
        }

        function kiirKonzolra(ki, mit, szin) {
            const chat = document.getElementById("chat");
            chat.innerHTML += `<p style="color: ${szin}; margin: 2px 0;"><b>${ki}:</b> ${mit}</p>`;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
